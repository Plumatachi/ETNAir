version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_USER: etnair_user
      POSTGRES_PASSWORD: etnair_pass
      POSTGRES_DB: etnair_db
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend_network
    ports:
      - "5432:5432"

  api:
    build: ./api
    container_name: etnair_api
    environment:
      DB_HOST: postgres
      DB_USER: etnair_user
      DB_PASSWORD: etnair_pass
      DB_NAME: etnair_db
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    networks:
      - backend_network

volumes:
  db_data:

networks:
  backend_network:
    driver: bridge
