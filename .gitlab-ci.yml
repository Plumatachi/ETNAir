variables:
  NODE_ENV: test

test:
  stage: test
  image: node:18
  script:
    - cd api
    - npm install
    - npm test
  only:
    - main
    - merge_requests

security:
  stage: security
  image: node:18
  script:
    - cd api
    - npm install
    - npm audit --audit-level=high
  only:
    - main
    - merge_requests

